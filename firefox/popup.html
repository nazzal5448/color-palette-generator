<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebColor</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-theme">
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-circle"></div>
        <span class="app-title">WebColor</span>
      </div>
      <span class="app-tagline">Webpage Colors Extractor</span>
    </header>

    <!-- Main Workspace -->
    <main class="app-content">
      <!-- Extraction Actions -->
      <div class="actions-card glass">
        <button id="extract-btn" class="primary-button">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path
              d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z">
            </path>
            <path d="M12 8V16"></path>
            <path d="M8 12H16"></path>
          </svg>
          Extract Webpage Colors
        </button>

        <button id="eyedropper-btn" class="secondary-button">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path
              d="M21 4c.6-.6.6-1.5 0-2.1s-1.5-.6-2.1 0L11 9.8c-.9-.3-2 .1-2.7.8L3 15.9c-.6.6-.6 1.5 0 2.1l3 3c.6.6 1.5.6 2.1 0l5.3-5.3c.7-.7 1.1-1.8.8-2.7L21 4zM7.5 19.5L4.5 16.5m9.3-5.7l-3-3">
            </path>
          </svg>
          Eyedropper Tool
        </button>
      </div>

      <!-- Colors Explorer Container -->
      <div class="results-header">
        <span id="results-count">No colors extracted</span>
        <button id="clear-btn" class="danger-text-btn hidden">Clear</button>
      </div>

      <div class="scroll-container">
        <!-- Default State Message -->
        <div id="empty-state-view" class="empty-state">
          <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 16v-4"></path>
            <path d="M12 8h.01"></path>
          </svg>
          <p>Open any web page and click the extract button above to analyze and extract its CSS colors.</p>
        </div>

        <!-- Color Palette List Grid -->
        <div id="colors-list-grid" class="colors-grid"></div>
      </div>
    </main>

    <!-- Harmony Generator Drawer (Hidden by default) -->
    <div id="harmony-drawer" class="drawer hidden">
      <div class="drawer-header">
        <span id="drawer-title">Harmonies for #6366F1</span>
        <button id="close-drawer-btn" class="icon-button">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="drawer-content">
        <div class="harmony-section">
          <h5>Complementary</h5>
          <div id="harmony-comp" class="harmony-row"></div>
        </div>
        <div class="harmony-section">
          <h5>Analogous</h5>
          <div id="harmony-analog" class="harmony-row"></div>
        </div>
        <div class="harmony-section">
          <h5>Monochromatic</h5>
          <div id="harmony-mono" class="harmony-row"></div>
        </div>
      </div>
    </div>

    <!-- Toast Alerts -->
    <div id="toast-notification" class="toast hidden">
      <span id="toast-message">Copied!</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
